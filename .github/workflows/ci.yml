name: FinScreen Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build, Lint & Test Pipeline
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 20.x ]

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Code Quality Auditing (ESLint)
        run: npm run lint

      - name: Formatting Verification (Prettier)
        run: npx prettier --check "frontend/src/**/*.{ts,tsx,css}" "backend/src/**/*.ts"

      - name: Run observation Test Suites
        run: npm run test

      - name: Compile Backend Distribution Assets
        run: npm run build:backend

      - name: Compile Frontend Distribution Assets
        run: npm run build:frontend
